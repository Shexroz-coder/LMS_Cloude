<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🤖 Robotic Edu LMS</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','sans-serif'] },
      colors: {
        primary: { 50:'#EFF6FF',100:'#DBEAFE',200:'#BFDBFE',500:'#3B82F6',600:'#2563EB',700:'#1D4ED8',800:'#1E40AF',900:'#1B3A6B' }
      }
    }
  }
}
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#F8FAFC}
.page{display:none}
.page.active{display:flex}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:rgba(255,255,255,.7)}
.sidebar-link:hover{background:rgba(255,255,255,.12);color:#fff}
.sidebar-link.active{background:rgba(255,255,255,.2);color:#fff}
.card{background:#fff;border-radius:12px;border:1px solid #f1f5f9;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn-primary{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#2563EB;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:#1D4ED8}
.btn-secondary{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#f1f5f9;color:#374151;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.stat-card{background:#fff;border-radius:12px;border:1px solid #f1f5f9;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:14px}
.stat-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
input:focus{outline:2px solid #2563EB;outline-offset:0}
.tab{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;color:#6B7280;background:transparent;border:none}
.tab.active{background:#EFF6FF;color:#2563EB}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.open{display:flex}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:99px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
.sidebar{width:240px;min-width:240px;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.main-content{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════ -->
<!-- LOGIN PAGE -->
<!-- ═══════════════════════════════════════════ -->
<div id="loginPage" class="page active" style="min-height:100vh;background:linear-gradient(135deg,#1B3A6B 0%,#2563EB 60%,#3B82F6 100%);align-items:center;justify-content:center;padding:20px">
  <div style="width:100%;max-width:420px" class="fade-in">
    <!-- Logo -->
    <div style="text-align:center;margin-bottom:28px">
      <div style="width:72px;height:72px;background:rgba(255,255,255,.15);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:14px">🤖</div>
      <div style="font-size:26px;font-weight:800;color:#fff">Robotic Edu</div>
      <div style="font-size:13px;color:rgba(255,255,255,.6);margin-top:4px">O'quv Markaz Boshqaruv Tizimi</div>
    </div>

    <!-- Card -->
    <div style="background:#fff;border-radius:20px;padding:32px;box-shadow:0 25px 60px rgba(0,0,0,.2)">
      <div style="font-size:17px;font-weight:700;color:#1E293B;margin-bottom:24px">Tizimga kirish</div>

      <div style="margin-bottom:16px">
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px">📱 Telefon raqam</label>
        <input id="loginPhone" type="tel" value="+998901234567" placeholder="+998 90 123 45 67"
          style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:inherit;transition:all .2s"/>
      </div>

      <div style="margin-bottom:20px">
        <label style="display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px">🔒 Parol</label>
        <input id="loginPass" type="password" value="admin123" placeholder="Parolni kiriting"
          style="width:100%;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:inherit;transition:all .2s"/>
      </div>

      <button onclick="doLogin()" id="loginBtn"
        style="width:100%;padding:13px;background:linear-gradient(135deg,#2563EB,#1D4ED8);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s">
        Tizimga kirish →
      </button>

      <!-- Demo accounts -->
      <div style="margin-top:22px;padding-top:20px;border-top:1px solid #F1F5F9">
        <div style="font-size:11px;color:#94A3B8;text-align:center;margin-bottom:12px">Demo kirish uchun tanlang:</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <button onclick="quickLogin('admin')" style="padding:9px;background:#EFF6FF;color:#2563EB;border:1px solid #BFDBFE;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
            👑 Admin
          </button>
          <button onclick="quickLogin('teacher')" style="padding:9px;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
            👨‍🏫 Ustoz
          </button>
          <button onclick="quickLogin('student')" style="padding:9px;background:#F5F3FF;color:#7C3AED;border:1px solid #DDD6FE;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
            🎓 O'quvchi
          </button>
          <button onclick="quickLogin('parent')" style="padding:9px;background:#FFF7ED;color:#D97706;border:1px solid #FED7AA;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer">
            👨‍👩‍👧 Ota-ona
          </button>
        </div>
      </div>
    </div>
    <div style="text-align:center;color:rgba(255,255,255,.4);font-size:12px;margin-top:16px">© 2026 Robotic Edu. Barcha huquqlar himoyalangan.</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- MAIN APP -->
<!-- ═══════════════════════════════════════════ -->
<div id="appPage" class="page" style="height:100vh;overflow:hidden">
  <!-- Sidebar -->
  <div id="sidebar" class="sidebar" style="background:linear-gradient(180deg,#1B3A6B 0%,#1E40AF 100%)">
    <!-- Logo -->
    <div style="padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px">
      <div style="width:36px;height:36px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">🤖</div>
      <div>
        <div style="font-weight:700;color:#fff;font-size:14px">Robotic Edu</div>
        <div style="font-size:11px;color:rgba(255,255,255,.4)">LMS v1.0</div>
      </div>
    </div>

    <!-- User info -->
    <div id="sidebarUser" style="padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)">
      <div style="display:flex;align-items:center;gap:10px">
        <div id="avatarCircle" style="width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0">A</div>
        <div style="min-width:0">
          <div id="sidebarName" style="color:#fff;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Super Admin</div>
          <div id="sidebarRole" style="color:rgba(255,255,255,.5);font-size:11px">👑 Admin</div>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav id="sidebarNav" style="flex:1;overflow-y:auto;padding:10px 8px">
    </nav>

    <!-- Logout -->
    <div style="padding:10px 8px;border-top:1px solid rgba(255,255,255,.08)">
      <div class="sidebar-link" onclick="doLogout()">
        <span>🚪</span><span>Chiqish</span>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div class="main-content">
    <!-- Header -->
    <div style="height:54px;background:#fff;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;padding:0 20px;gap:12px;flex-shrink:0">
      <div style="flex:1;position:relative;max-width:280px">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#94A3B8;font-size:14px">🔍</span>
        <input type="text" placeholder="Qidirish..." style="width:100%;padding:8px 12px 8px 32px;background:#F8FAFC;border:1.5px solid #F1F5F9;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
        <!-- Language -->
        <div style="display:flex;background:#F1F5F9;border-radius:8px;padding:3px;gap:2px">
          <button id="langUz" onclick="setLang('uz')" style="padding:4px 10px;border-radius:6px;background:#2563EB;color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer">🇺🇿 O'z</button>
          <button id="langRu" onclick="setLang('ru')" style="padding:4px 10px;border-radius:6px;background:transparent;color:#6B7280;border:none;font-size:12px;font-weight:500;cursor:pointer">🇷🇺 Ру</button>
        </div>
        <!-- Bell -->
        <button onclick="showSection('notifications')" style="width:36px;height:36px;background:#F8FAFC;border:1.5px solid #F1F5F9;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative">
          🔔
          <span style="position:absolute;top:4px;right:4px;width:8px;height:8px;background:#EF4444;border-radius:50%;border:2px solid #fff"></span>
        </button>
        <!-- User -->
        <div id="headerUser" style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:4px 10px 4px 4px;border-radius:8px;border:1.5px solid #F1F5F9" onclick="showSection('profile')">
          <div id="headerAvatar" style="width:30px;height:30px;border-radius:50%;background:#DBEAFE;color:#2563EB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px">A</div>
          <div style="font-size:13px;font-weight:500;color:#374151" id="headerName">Admin</div>
        </div>
      </div>
    </div>

    <!-- Page Content -->
    <div style="flex:1;overflow-y:auto;padding:20px" id="pageContent">
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ -->
<!-- ADD STUDENT MODAL -->
<!-- ═══════════════════════════════════════════ -->
<div id="addStudentModal" class="modal">
  <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:480px;margin:20px" class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:16px;font-weight:700;color:#1E293B">➕ Yangi O'quvchi</div>
      <button onclick="closeModal('addStudentModal')" style="width:30px;height:30px;background:#F1F5F9;border:none;border-radius:8px;cursor:pointer;font-size:16px">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="grid-column:1/-1">
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">To'liq ism *</label>
        <input type="text" placeholder="Familiya Ism" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Telefon *</label>
        <input type="tel" placeholder="+998901234567" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Tug'ilgan sana</label>
        <input type="date" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Guruh</label>
        <select style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit">
          <option>Robotika-A</option>
          <option>Arduino-B</option>
          <option>Coding-C</option>
          <option>IoT-A</option>
        </select>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Chegirma turi</label>
        <select style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit">
          <option>Yo'q</option>
          <option>Foizda (%)</option>
          <option>Aniq summa</option>
        </select>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Chegirma miqdori</label>
        <input type="number" placeholder="0" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div style="grid-column:1/-1">
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Ota-ona telefoni</label>
        <input type="tel" placeholder="+998901234567" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
      <div style="grid-column:1/-1">
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Izoh</label>
        <textarea rows="2" placeholder="Qo'shimcha ma'lumot..." style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit;resize:none"></textarea>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button onclick="closeModal('addStudentModal')" class="btn-secondary">Bekor qilish</button>
      <button onclick="saveStudent()" class="btn-primary">💾 Saqlash</button>
    </div>
  </div>
</div>

<!-- ADD PAYMENT MODAL -->
<div id="addPaymentModal" class="modal">
  <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:440px;margin:20px" class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:16px;font-weight:700;color:#1E293B">💰 To'lov Qabul Qilish</div>
      <button onclick="closeModal('addPaymentModal')" style="width:30px;height:30px;background:#F1F5F9;border:none;border-radius:8px;cursor:pointer;font-size:16px">×</button>
    </div>
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">O'quvchi *</label>
        <select style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit">
          <option>Bobur Toshmatov</option>
          <option>Dilnoza Yusupova</option>
          <option>Jasur Karimov</option>
          <option>Malika Rahimova</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Summa (so'm) *</label>
          <input type="number" placeholder="500000" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Oy *</label>
          <input type="month" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">To'lov usuli</label>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
          <label style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:1.5px solid #E2E8F0;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;color:#374151">
            <input type="radio" name="pMethod" value="cash" checked style="display:none"/>
            <span style="font-size:18px">💵</span>Naqd
          </label>
          <label style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:1.5px solid #E2E8F0;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;color:#374151">
            <input type="radio" name="pMethod" value="card" style="display:none"/>
            <span style="font-size:18px">💳</span>Karta
          </label>
          <label style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:1.5px solid #E2E8F0;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;color:#374151">
            <input type="radio" name="pMethod" value="transfer" style="display:none"/>
            <span style="font-size:18px">🏦</span>O'tkazma
          </label>
          <label style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px;border:1.5px solid #E2E8F0;border-radius:8px;cursor:pointer;font-size:11px;font-weight:500;color:#374151">
            <input type="radio" name="pMethod" value="online" style="display:none"/>
            <span style="font-size:18px">📱</span>Online
          </label>
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Izoh</label>
        <input type="text" placeholder="Ixtiyoriy..." style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end">
      <button onclick="closeModal('addPaymentModal')" class="btn-secondary">Bekor qilish</button>
      <button onclick="savePayment()" class="btn-primary">✅ Qabul qilish</button>
    </div>
  </div>
</div>

<!-- GIVE COIN MODAL -->
<div id="giveCoinModal" class="modal">
  <div style="background:#fff;border-radius:16px;padding:28px;width:100%;max-width:420px;margin:20px" class="fade-in">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="font-size:16px;font-weight:700;color:#1E293B">🪙 Coin Berish</div>
      <button onclick="closeModal('giveCoinModal')" style="width:30px;height:30px;background:#F1F5F9;border:none;border-radius:8px;cursor:pointer;font-size:16px">×</button>
    </div>
    <div style="display:grid;gap:12px">
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">O'quvchi</label>
        <select style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit">
          <option>Bobur Toshmatov (50 🪙)</option>
          <option>Dilnoza Yusupova (120 🪙)</option>
          <option>Jasur Karimov (85 🪙)</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Coin miqdori</label>
          <input type="number" value="10" min="1" max="100" style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Tur</label>
          <select style="width:100%;padding:10px 12px;border:1.5px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit">
            <option>🏆 Mukofot</option>
            <option>⭐ Bonus</option>
            <option>❌ Jarima</option>
          </select>
        </div>
      </div>
      <div>
        <label style="font-size:12px;font-weight:500;color:#374151;display:block;margin-bottom:5px">Sabab</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">

function quickLogin(role) {

function doLogin(forcedRole) {
  const btn = document.getElementById('loginBtn');
  btn.textContent = '⏳ Kirilmoqda...';
  btn.disabled = true;
  setTimeout(() => {
    const role = forcedRole || 'admin';
    currentUser = { ...USERS[role], key: role };
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('appPage').classList.add('active');
    setupSidebar();
    showSection('dashboard');
    showToast('✅ Xush kelibsiz, ' + currentUser.name + '!', 'success');
    btn.textContent = 'Tizimga kirish →';
    btn.disabled = false;
  }, 800);

function doLogout() {
  currentUser = null;

function setupSidebar() {

  document.getElementById('sidebarName').textContent = u.name;

  document.getElementById('avatarCircle').textContent = u.name[0];
  document.getElementById('headerName').textContent = u.name.split(' ')[0];
  document.getElementById('headerAvatar').textContent = u.name[0];

  const nav = document.getElementById('sidebarNav');
  const items = NAV[u.role] || NAV.ADMIN;
  nav.innerHTML = items.map(item => `
    <div class="sidebar-link" id="nav_${item.s}" onclick="showSection('${item.s}')">
      <span>${item.i}</span>
      <span>${T[currentLang][item.s] || item.s}</span>
    </div>
  `).join('');
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('langUz').style.background = lang==='uz' ? '#2563EB' : 'transparent';
  document.getElementById('langUz').style.color = lang==='uz' ? '#fff' : '#6B7280';
  document.getElementById('langRu').style.background = lang==='ru' ? '#2563EB' : 'transparent';
  document.getElementById('langRu').style.color = lang==='ru' ? '#fff' : '#6B7280';
  if (currentUser) setupSidebar();
}

// ══════════════════════════════════════
// NAVIGATION

function showSection(sec) {
  currentSection = sec;
  // Update active nav
  document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
  const activeEl = document.getElementById('nav_' + sec);
  if (activeEl) activeEl.classList.add('active');

  const role = currentUser?.role || 'ADMIN';
  const content = document.getElementById('pageContent');

  const pages = {
    dashboard:     role === 'ADMIN'   ? renderAdminDashboard()
                 : role === 'TEACHER' ? renderTeacherDashboard()
                 : role === 'STUDENT' ? renderStudentDashboard()
                 : renderParentDashboard(),
    students:      renderStudents(),
    teachers:      renderTeachers(),
    groups:        renderGroups(),
    schedule:      renderSchedule(),
    attendance:    renderAttendance(),
    grades:        renderGrades(),
    payments:      renderPayments(),
    finance:       renderFinance(),
    salaries:      renderSalaries(),
    coins:         renderCoins(),
    chat:          renderChat(),
    notifications: renderNotifications(),
    announcements: renderAnnouncements(),
    reports:       renderReports(),
    profile:       renderProfile(),
  };

  content.innerHTML = `<div class="fade-in">${pages[sec] || renderComingSoon(sec)}</div>`;

  // Charts
  if (sec === 'dashboard' && role === 'ADMIN') setTimeout(renderCharts, 50);
  if (sec === 'finance') setTimeout(renderFinanceCharts, 50);
}

      </div>
      <div style="flex:1;overflow-y:auto">
        ${[['Robotika-A','Guruh','Uy ishi qachon?','Hozir','3'],
           ['Alisher K.','Ustoz','Rahmat!','5 daq',''],
           ['Bobur Toshmatov',"O'quvchi","Savolim bor",'10 daq','1'],
           ['Jasur T.','Ota-ona',"To'lovni qildim",'1 soat','']].map(([n,r,m,t,c])=>`
          <div onclick="openChatWith('${n}')" style="display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;border-bottom:1px solid #F8FAFC;transition:background .15s" onmouseover="this.style.background='#F8FAFC'" onmouseout="this.style.background=''">
            <div style="width:38px;height:38px;border-radius:50%;background:#DBEAFE;color:#2563EB;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0">${n[0]}</div>
            <div style="flex:1;min-width:0">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-size:13px;font-weight:600;color:#1E293B">${n}</span>
                <span style="font-size:10px;color:#94A3B8">${t}</span>
              </div>
              <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
                <span style="font-size:11px;color:#64748B;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px">${m}</span>
                ${c?`<span style="background:#2563EB;color:#fff;font-size:10px;font-weight:600;min-width:18px;height:18px;border-radius:99px;display:flex;align-items:center;justify-content:center;padding:0 4px">${c}</span>`:''}
              </div>
            </div>
          </div>`).join('')}
      </div>
    </div>
    <!-- Chat area -->
    <div id="chatArea" style="flex:1;background:#fff;border-radius:12px;border:1px solid #F1F5F9;display:flex;flex-direction:column;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid #F1F5F9;display:flex;align-items:center;gap:10px">
        <div style="width:36px;height:36px;border-radius:50%;background:#DBEAFE;color:#2563EB;display:flex;align-items:center;justify-content:center;font-weight:700">R</div>
        <div><div style="font-size:14px;font-weight:600;color:#1E293B">Robotika-A</div><div style="font-size:11px;color:#16A34A">● 18 ta a'zo</div></div>
      </div>
      <div id="chatMessages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px">
        ${[['Alisher K.','Uyga vazifa — Servo motorni ulash. Holbuki schemani chizing.',false,'14:20'],
           ['Bobur','Ha ustoz! Tushundim.✅',true,'14:22'],
           ['Dilnoza','Ustoz, link joylaysizmi?',false,'14:23'],
           ['Alisher K.',"Mana: https://example.com/servo-circuit",false,'14:25'],
           ['Bobur','Rahmat! 🙏',true,'14:26']].map(([s,m,mine,t])=>`
          <div style="display:flex;${mine?'justify-content:flex-end':'gap:8px'}">
            ${!mine?`<div style="width:30px;height:30px;border-radius:50%;background:#EFF6FF;color:#2563EB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:auto">${s[0]}</div>`:''}
            <div style="max-width:65%">
              ${!mine?`<div style="font-size:11px;color:#64748B;margin-bottom:4px">${s}</div>`:''}
              <div style="padding:10px 13px;border-radius:${mine?'14px 14px 4px 14px':'14px 14px 14px 4px'};background:${mine?'#2563EB':'#F1F5F9'};color:${mine?'#fff':'#1E293B'};font-size:13px">${m}</div>
              <div style="font-size:10px;color:#94A3B8;margin-top:3px;text-align:${mine?'right':'left'}">${t}</div>
            </div>
          </div>`).join('')}
      </div>
      <div style="padding:12px 16px;border-top:1px solid #F1F5F9;display:flex;gap:8px">
        <input type="text" id="chatInput" placeholder="Xabar yozing..." onkeydown="if(event.key==='Enter')sendChat()"
          style="flex:1;padding:10px 14px;background:#F8FAFC;border:1.5px solid #F1F5F9;border-radius:10px;font-size:13px;font-family:inherit"/>
        <button onclick="sendChat()" style="padding:10px 16px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer">Yuborish →</button>
      </div>
    </div>
  </div>`;
}

function openChatWith(name) {
  const area = document.getElementById('chatArea');
  if (area) area.querySelector('div').querySelector('div:last-child').textContent = name;
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  if (!inp || !inp.value.trim()) return;
  const msgs = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style = 'display:flex;justify-content:flex-end';
  div.innerHTML = `<div style="max-width:65%"><div style="padding:10px 13px;border-radius:14px 14px 4px 14px;background:#2563EB;color:#fff;font-size:13px">${inp.value}</div><div style="font-size:10px;color:#94A3B8;margin-top:3px;text-align:right">Hozir</div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  inp.value = '';
}

// ══════════════════════════════════════
// HELPERS
// ══════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  const icons = {success:'✅',error:'❌',info:'ℹ️'};
  t.innerHTML = `<span>${icons[type]||'✅'}</span> ${msg}`;
  t.style.display = 'flex';
  t.style.background = type==='error'?'#DC2626':'#1E293B';
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.style.display='none', 3000);
}

function saveStudent() {
  closeModal('addStudentModal');
  showToast("✅ O'quvchi muvaffaqiyatli qo'shildi!");
}

function savePayment() {
  closeModal('addPaymentModal');
  showToast("✅ To'lov qabul qilindi!");
}

function saveCoin() {
  closeModal('giveCoinModal');
  showToast('🪙 Coin muvaffaqiyatli berildi!');
}

function saveAttendance() {
  showToast('✅ Davomat saqlandi!');
}

function setAtt(btn, val) {
  const row = btn.closest('tr');
  row.querySelectorAll('button').forEach(b => {
    b.style.background = '#fff';
    b.style.color = '#94A3B8';
    b.style.borderColor = '#E2E8F0';
  });
  const colors = {PRESENT:'#DCFCE7,#166534',ABSENT:'#FFE4E6,#DC2626',LATE:'#FEF9C3,#92400E',EXCUSED:'#EFF6FF,#2563EB'};
  const [bg, col] = (colors[val]||'').split(',');
  btn.style.background = bg;
  btn.style.color = col;
  btn.style.borderColor = col;
}

function setCoinReason(btn, text) {
  document.getElementById('coinReason').value = text;
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1).toLowerCase() : ''; }

// Close modals on backdrop click
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
</script>
